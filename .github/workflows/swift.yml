# Build and test on macOS + Linux. Strict-concurrency is enforced via
# swiftLanguageModes: [.v6] in Package.swift, so no extra flags here.

name: Swift

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  macos:
    name: Test on macOS
    runs-on: macos-latest
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v --parallel

  linux:
    name: Test on Linux (Swift ${{ matrix.swift }})
    strategy:
      fail-fast: false
      matrix:
        swift: ["6.3"]
    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v --parallel
